<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question - Quiz Master</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ---- Quiz header ---- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f8;
            flex-wrap: wrap;
            gap: 12px;
        }

        .quiz-info {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-label {
            color: #aaa;
            font-size: 0.85em;
            font-weight: 500;
        }

        .info-value {
            font-weight: 700;
            color: #333;
            font-size: 0.95em;
        }

        /* ---- Difficulty Badges ---- */
        .difficulty-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .difficulty-easy {
            background: #d1fae5;
            color: #065f46;
        }

        .difficulty-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .difficulty-hard {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ---- Timer ---- */
        .timer {
            font-size: 1.1em;
            font-weight: 700;
            padding: 7px 14px;
            border-radius: 8px;
            background: #f0f0f8;
            min-width: 65px;
            text-align: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .timer.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .timer.danger {
            background: #fee2e2;
            color: #991b1b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.06);
            }
        }

        /* ---- Progress bar ---- */
        .progress-bar {
            background: #e4e4f0;
            height: 7px;
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #667eea 100%);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* ---- Question number pill ---- */
        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        /* ---- Question text ---- */
        .question-text {
            font-size: 1.3em;
            margin-bottom: 28px;
            line-height: 1.65;
            color: #1e1e2e;
            font-weight: 600;
        }

        /* ---- Options ---- */
        .options-container {
            margin-bottom: 20px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 16px 18px;
            background: #f8f8fc;
            border: 2px solid #e4e4f0;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-label:hover {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateX(5px);
        }

        .option-label input[type="radio"] {
            margin-top: 2px;
            margin-right: 14px;
            width: 19px;
            height: 19px;
            flex-shrink: 0;
            accent-color: #667eea;
            cursor: pointer;
        }

        .option-label input[type="radio"]:checked~.option-text {
            color: #667eea;
            font-weight: 700;
        }

        .option-text {
            flex: 1;
            color: #333;
            font-size: 1em;
            line-height: 1.5;
        }

        /* ---- Actions ---- */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        button[type="submit"] {
            flex: 1;
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .quiz-info {
                gap: 10px;
            }

            .info-label {
                font-size: 0.8em;
            }

            .question-text {
                font-size: 1.1em;
                margin-bottom: 20px;
            }

            .option-label {
                padding: 13px 14px;
                margin: 8px 0;
            }

            .option-label input[type="radio"] {
                width: 17px;
                height: 17px;
                margin-right: 10px;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Quiz Header -->
        <div class="quiz-header">
            <div class="quiz-info">
                <div class="info-item">
                    <span class="info-label">Category:</span>
                    <span class="info-value">{{ category_name }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Difficulty:</span>
                    <span class="difficulty-badge difficulty-{{ difficulty.lower() }}">{{ difficulty }}</span>
                </div>
            </div>
            <div class="info-item">
                <span class="info-label">⏱️</span>
                <span class="timer" id="timer">00:00</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" style="width: {{ (index / total) * 100 }}%"></div>
        </div>

        <!-- Question Counter -->
        <div class="question-number">Question {{ index }} of {{ total }}</div>

        <!-- Question Text -->
        <h2 class="question-text">{{ q.question }}</h2>

        <!-- Answer Form -->
        <form method="post" id="quizForm">
            <div class="options-container">
                {% for option in q.options %}
                <label class="option-label">
                    <input type="radio" name="answer" value="{{ option }}" required>
                    <span class="option-text">{{ option }}</span>
                </label>
                {% endfor %}
            </div>

            <div class="form-actions">
                <button type="submit">Next Question →</button>
            </div>
        </form>
    </div>

    <script>
        let seconds = 0;

        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const display = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            const timerEl = document.getElementById('timer');
            timerEl.textContent = display;

            if (seconds > 180) {
                timerEl.className = 'timer danger';
            } else if (seconds > 120) {
                timerEl.className = 'timer warning';
            }
        }

        setInterval(updateTimer, 1000);

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                const checkedRadio = document.querySelector('input[name="answer"]:checked');
                if (checkedRadio) {
                    document.getElementById('quizForm').submit();
                }
            }
        });
    </script>
</body>

</html>
