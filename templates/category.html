<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Category & Difficulty - Quiz Master</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header p {
            color: #999;
            font-size: 1.02em;
            margin-top: 6px;
        }

        /* ---- Section ---- */
        .section {
            margin-bottom: 36px;
        }

        .section-title {
            color: #333;
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ---- Categories Grid ---- */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 14px;
            margin-bottom: 8px;
        }

        .category-card {
            background: white;
            border: 2px solid #e4e4f0;
            border-radius: 12px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 130px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .category-card:hover::before {
            left: 100%;
        }

        .category-card input[type="radio"] {
            display: none;
        }

        .category-card input[type="radio"]:checked+.card-content .category-name {
            color: white;
            font-weight: 700;
        }

        .category-card input[type="radio"]:checked~.card-bg {
            opacity: 1;
        }

        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .category-card:hover {
            border-color: transparent;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
            transform: translateY(-5px);
        }

        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .category-emoji {
            font-size: 2.2em;
            margin-bottom: 8px;
            display: block;
        }

        .category-name {
            font-size: 0.88em;
            font-weight: 600;
            color: #333;
            line-height: 1.3;
        }

        /* ---- Difficulty ---- */
        .difficulty-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .difficulty-option {
            position: relative;
        }

        .difficulty-option input[type="radio"] {
            display: none;
        }

        .difficulty-option label {
            display: block;
            padding: 12px 28px;
            border: 2px solid #e4e4f0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.97em;
            transition: all 0.25s ease;
            background: white;
            color: #666;
            -webkit-tap-highlight-color: transparent;
        }

        .difficulty-option input[type="radio"]:checked+label {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .difficulty-option input[type="radio"]:checked+label.easy {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 14px rgba(74, 222, 128, 0.4);
        }

        .difficulty-option input[type="radio"]:checked+label.medium {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 4px 14px rgba(251, 191, 36, 0.4);
        }

        .difficulty-option input[type="radio"]:checked+label.hard {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        }

        .difficulty-option label:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* ---- Submit ---- */
        .form-actions {
            text-align: center;
            margin-top: 32px;
        }

        .btn-submit {
            padding: 16px 60px;
            font-size: 1.1em;
        }

        /* ---- Responsive ---- */
        @media (max-width: 640px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .category-card {
                min-height: 110px;
            }

            .difficulty-group {
                gap: 8px;
            }

            .difficulty-option label {
                padding: 11px 20px;
                font-size: 0.9em;
            }

            .btn-submit {
                width: 100%;
                padding: 15px 20px;
            }
        }

        @media (max-width: 380px) {
            .category-card {
                padding: 14px 8px;
                min-height: 95px;
            }

            .category-emoji {
                font-size: 1.8em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1>🎯 Choose Your Challenge</h1>
            <p>Select a category and difficulty level to begin</p>
        </div>

        <form method="post" id="quizForm">
            <!-- Category Selection -->
            <div class="section">
                <div class="section-title">📚 Category</div>
                <div class="categories-grid">
                    {% for key, category in categories.items() %}
                    <label class="category-card">
                        <input type="radio" name="category" value="{{ key }}" required>
                        <div class="card-content">
                            <span class="category-emoji">{{ category.emoji }}</span>
                            <div class="category-name">{{ category.name }}</div>
                        </div>
                        <div class="card-bg"
                            style="background: linear-gradient(135deg, {{ category.color }}, {{ category.color }}cc)">
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Difficulty Selection -->
            <div class="section">
                <div class="section-title">⚡ Difficulty Level</div>
                <div class="difficulty-group">
                    <div class="difficulty-option">
                        <input type="radio" id="easy" name="difficulty" value="easy">
                        <label for="easy" class="easy">🟢 Easy</label>
                    </div>
                    <div class="difficulty-option">
                        <input type="radio" id="medium" name="difficulty" value="medium" checked>
                        <label for="medium" class="medium">🟡 Medium</label>
                    </div>
                    <div class="difficulty-option">
                        <input type="radio" id="hard" name="difficulty" value="hard">
                        <label for="hard" class="hard">🔴 Hard</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Start Quiz 🚀</button>
            </div>
        </form>
    </div>
</body>

</html>
